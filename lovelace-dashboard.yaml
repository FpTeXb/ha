# === Lovelace 仪表盘 · Mushroom + card-mod 高保真版 ===
#
# 🧩 依赖（必装，HACS）：
#   - Mushroom            (frontend cards: light/climate/cover/vacuum/media/template)
#   - card-mod            (CSS overrides — 让所有卡变成深色玻璃)
#   - lovelace-card-mod   (同 card-mod，HACS 里可能显示这个名字)
#
# ⚠️ 部署顺序（极其重要）：
#   1) HACS 中装好 Mushroom + card-mod
#   2) 复制 www/floorplan/*.png 到 /config/www/floorplan/
#   3) scenes.yaml 追加到 /config/scenes.yaml（或 !include）
#   4) scripts.yaml 追加到 /config/scripts.yaml（或 !include）
#   5) 重启 Home Assistant
#   6) 设置 → 仪表盘 → 添加仪表盘 → 新仪表盘（从头开始）
#      → 编辑 → 三点 → 原始配置编辑器 → 粘贴本文件 from "title:" → 保存
#
# 户型平面图实现：
#   - 基础图：/local/floorplan/base.png
#   - 每盏灯一个 conditional image 叠加层，开灯时显示
#   - 用 mix-blend-mode: screen 让叠加图与基础图相加（亮起效果）
#   - 灯/空调/窗帘的圆形 dot 放在最上层，可点击交互
#
# 如仍有"未找到实体"卡片：
#   - light.zhuwei / light.kewei / light.ruhu / light.zoudao
#     → 是原型里给主卫/客卫/入户/走道用的简写 ID
#     → 改成你 HA 里实际的 entity_id（开发者工具 → 状态 里查）
#   - vacuum.* / sensor.roborock_* / media_player.* → 占位，请替换

title: 我的家
views:
- title: 主页
  path: home
  type: sections
  max_columns: 4
  sections:
  - type: grid
    column_span: 4
    cards:
    - type: heading
      heading: "我的家 · 户型"
    - type: picture-elements
      image: /local/floorplan/base.png
      card_mod:
        style: |
          ha-card {
            background: rgba(20,22,30,0.55) !important;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.06) !important;
            border-radius: 18px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
          }
          ha-card { padding: 8px !important; }
      elements:
      - type: conditional
        conditions:
        - entity: light.yeelink_cn_2027394738_ceil47_s_2_light
          state: "on"
        elements:
        - type: image
          image: /local/floorplan/light.yeelink_cn_2027394738_ceil47_s_2_light.png
          style:
            top: "50%"
            left: "50%"
            width: "100%"
            height: "100%"
            mix-blend-mode: screen
            pointer-events: none
            transition: "opacity 400ms ease"
