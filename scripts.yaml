# 别名脚本：对应原仪表盘的"回家 / 离家"按钮
scene_home:
  alias: 场景 · 回家
  icon: mdi:home
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.home_return

scene_away:
  alias: 场景 · 离家
  icon: mdi:door-open
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.home_away
