<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>我的家 · Home Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=ac-color-aura-1"/>
  <style>
    html, body { background: #0a0c12; min-height: 100vh; margin: 0; overflow: hidden; }
    body {
      display: flex; align-items: center; justify-content: center;
    }
    .stage {
      width: 1024px; height: 768px;
      transform-origin: center center;
      flex-shrink: 0;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 8px 22px rgba(0,0,0,0.25);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #2a2d36;
    }
    .stage > #root, .stage > #root > .tablet { width: 100%; height: 100%; }
    input { font-family: inherit; }
    input:focus { border-color: var(--amber) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="entities.js?v=master-curtain-gap-1"></script>
  <script src="ha-client.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="v2-refined.jsx?v=legend-right-1"></script>
  <script type="text/babel" src="dashboard-shell.jsx?v=curtain-pause-reverse"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
  </script>

  <script>
    (function () {
      const stage = document.getElementById("stage");
      function fit() {
        const pad = 16;
        const sw = window.innerWidth - pad * 2;
        const sh = window.innerHeight - pad * 2;
        const k = Math.min(sw / 1024, sh / 768, 2);
        stage.style.transform = `scale(${k})`;
      }
      window.addEventListener("resize", fit);
      fit();
    })();
  </script>
</body>
</html>
